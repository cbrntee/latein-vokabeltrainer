<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vokabeltraining</title>
<style>
  :root {
    --paper: #FBF7EE; --ink: #1E3A5F; --ink-dark: #16293f;
    --green: #2F7A4D; --green-bg: #eaf3ec; --red: #C1483B; --red-bg: #fbeae7;
    --gold: #E3A008; --line: #e4dcc8; --muted: #8a8368; --text: #5b5646;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--paper);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .bg-lines { position: fixed; inset: 0; pointer-events: none; opacity: 0.35;
    background-image: repeating-linear-gradient(to bottom, transparent, transparent 27px, #cfd8e3 28px); z-index: 0; }
  .wrap { position: relative; width: 100%; max-width: 560px; z-index: 1; }
  .card { background: #fff; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    border: 1px solid var(--line); padding: 32px; }
  h1 { font-size: 26px; color: var(--ink); margin: 8px 0 8px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: monospace; }
  p.desc { color: var(--text); line-height: 1.5; margin-bottom: 20px; }
  button { font-family: inherit; -webkit-tap-highlight-color: rgba(0,0,0,0.1); touch-action: manipulation; }
  .btn-main { width: 100%; background: var(--ink); color: #fff; border: none; border-radius: 12px;
    padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn-main:active { background: var(--ink-dark); }
  .btn-main:disabled { opacity: 0.5; cursor: default; }
  .btn-outline { width: 100%; background: #fff; color: var(--ink); border: 2px solid var(--ink);
    border-radius: 12px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-small { flex: 1; background: #fff; color: var(--ink); border: 1px solid var(--line);
    border-radius: 10px; padding: 9px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .btn-row { display: flex; gap: 8px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-box { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--ink); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
  .lektion-bar { width: 100%; height: 8px; background: var(--line); border-radius: 999px; overflow: hidden; margin: 6px 0 20px; }
  .lektion-fill { height: 100%; background: var(--gold); transition: width 0.4s; }
  .sync-note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 14px; }
  .sync-note.err { color: var(--red); }
  .sync-note.ok { color: var(--green); }
  .tools-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 22px 0 8px; text-align: center; }
  .progress-row { display: flex; justify-content: space-between; font-size: 12px; font-family: monospace; color: var(--muted); margin-bottom: 8px; padding: 0 4px; }
  .progress-bar { width: 100%; height: 8px; background: var(--line); border-radius: 999px; overflow: hidden; margin-bottom: 24px; }
  .progress-fill { height: 100%; background: var(--green); transition: width 0.4s; }
  .quiz-card { position: relative; border: 2px solid var(--line); border-radius: 18px; background: #fff; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .quiz-card.correct { border-color: var(--green); }
  .quiz-card.wrong { border-color: var(--red); }
  .qlabel { position: absolute; top: -11px; left: 24px; background: var(--paper); padding: 2px 8px;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-family: monospace;
    border: 1px solid var(--line); border-radius: 4px; }
  .qmeta { position: absolute; top: -11px; right: 24px; background: var(--paper); padding: 2px 8px;
    font-size: 10px; color: var(--muted); font-family: monospace; border: 1px solid var(--line); border-radius: 4px; }
  .question { font-size: 26px; font-weight: bold; color: var(--ink); text-align: center; margin: 16px 0 28px; word-break: break-word; }
  input[type=text], input[type=number] { width: 100%; border: none; border-bottom: 2px solid #c9bfa0; outline: none;
    font-size: 18px; padding: 8px; text-align: center; background: transparent; color: var(--ink); font-family: inherit; }
  input[type=text]:focus, input[type=number]:focus { border-bottom-color: var(--ink); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 10px; text-align: center; }
  .feedback { display: flex; align-items: center; justify-content: center; gap: 8px; border-radius: 12px; padding: 12px; margin-bottom: 16px; font-weight: 600; }
  .feedback.correct { background: var(--green-bg); color: var(--green); }
  .feedback.wrong { background: var(--red-bg); color: var(--red); }
  .correct-answer { text-align: center; color: var(--text); margin-bottom: 16px; }
  .correct-answer b { color: var(--ink); }
  .done-title { font-size: 24px; color: var(--ink); text-align: center; margin: 8px 0; }
  .big-emoji { font-size: 40px; text-align: center; margin-bottom: 8px; }
  .stats { color: var(--text); text-align: center; margin-bottom: 20px; }
  .hardlist { text-align: left; background: var(--paper); border-radius: 12px; padding: 16px; margin-bottom: 20px; border: 1px solid var(--line); max-height: 220px; overflow-y: auto; }
  .hardlist-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
  .hardlist-item { display: flex; justify-content: space-between; font-size: 14px; color: var(--text); padding: 2px 0; }
  .hardlist-item .cnt { color: var(--red); font-family: monospace; }
  .hidden { display: none !important; }
  .spinner { text-align: center; color: var(--muted); padding: 40px 0; }
  .errbox { background: var(--red-bg); color: var(--red); border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.5; }
  .edit-link { text-align: center; font-size: 12px; color: var(--muted); text-decoration: underline; cursor: pointer; margin-top: -14px; margin-bottom: 18px; }
  .edit-form label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; }
  .edit-form input { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px;
    font-size: 15px; text-align: left; background: #fff; color: var(--ink); font-family: inherit; }
  .edit-form .btn-row { margin-top: 18px; }
</style>
</head>
<body>
<div class="bg-lines"></div>
<div class="wrap">

  <div id="loading" class="card"><div class="spinner">Wird geladen …</div></div>

  <div id="errorScreen" class="card hidden">
    <div class="eyebrow">Fehler</div>
    <h1>Etwas ist schiefgelaufen</h1>
    <div class="errbox" id="errText"></div>
  </div>

  <!-- DASHBOARD / SETUP -->
  <div id="setup" class="card hidden">
    <div class="eyebrow" id="setupEyebrow"></div>
    <h1 id="setupTitle"></h1>
    <p class="desc" id="setupDesc"></p>

    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num" id="statLerntag"></div><div class="stat-label">Lerntag</div></div>
      <div class="stat-box"><div class="stat-num" id="statDue"></div><div class="stat-label">heute fällig</div></div>
      <div class="stat-box"><div class="stat-num" id="statMastered"></div><div class="stat-label">sicher gekonnt</div></div>
      <div class="stat-box"><div class="stat-num" id="statLektionen"></div><div class="stat-label">Lektionen frei</div></div>
    </div>
    <div class="lektion-bar"><div class="lektion-fill" id="lektionFill" style="width:0%"></div></div>

    <button class="btn-main" id="startBtn" onclick="startSession()">✨ Training starten</button>
    <div class="sync-note" id="syncNote"></div>

    <div class="tools-title">Fortschritt &amp; Vokabeln</div>
    <div class="btn-row">
      <button class="btn-small" onclick="exportProgress()">⬇ Fortschritt sichern</button>
      <button class="btn-small" onclick="document.getElementById('importFile').click()">⬆ Fortschritt laden</button>
      <button class="btn-small" onclick="exportVocab()">⬇ Vokabelliste (CSV)</button>
    </div>
    <input type="file" id="importFile" accept="application/json" class="hidden" onchange="importProgress(event)" />
    <div class="sync-note" id="toolsNote"></div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz" class="hidden">
    <div class="progress-row">
      <span id="doneCount">0 / 0 in dieser Sitzung</span>
      <span id="remainCount"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

    <div class="quiz-card" id="quizCard">
      <div class="qlabel" id="qlabel"></div>
      <div class="qmeta" id="qmeta"></div>
      <div class="question" id="questionText"></div>

      <div id="answeringBox">
        <input type="text" id="answerInput" placeholder="Antwort eintippen..." autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
        <button class="btn-main" style="margin-top:20px" onclick="checkAnswer()">Prüfen</button>
        <div class="hint">Groß-/Kleinschreibung ist egal. Mehrere richtige Antworten sind möglich.</div>
      </div>

      <div id="feedbackBox" class="hidden">
        <div class="feedback" id="feedbackMsg"></div>
        <div class="correct-answer hidden" id="correctAnswerBox"></div>
        <button class="btn-main" onclick="nextWord()">Weiter →</button>
      </div>

      <div id="editForm" class="edit-form hidden">
        <label id="editBegriffLabel">Begriff</label>
        <input type="text" id="editBegriff" />
        <label id="editUebLabel">Übersetzung</label>
        <input type="text" id="editUebersetzung" />
        <label>Lektion</label>
        <input type="number" id="editLektion" min="1" />
        <div class="btn-row">
          <button class="btn-outline" onclick="toggleEdit()">Abbrechen</button>
          <button class="btn-main" onclick="saveWordEdit()">Speichern</button>
        </div>
        <div class="sync-note" id="editSyncNote"></div>
      </div>
    </div>
    <div class="edit-link" id="editLink" onclick="toggleEdit()">✎ Dieses Wort korrigieren</div>
  </div>

  <!-- DONE SCREEN -->
  <div id="done" class="card hidden">
    <div class="big-emoji">✨</div>
    <div class="done-title">Sitzung beendet!</div>
    <div class="stats" id="doneStats"></div>
    <div id="hardWordsBox"></div>
    <div class="btn-row">
      <button class="btn-main" onclick="location.reload()">↺ Zurück zur Übersicht</button>
    </div>
    <div class="sync-note ok" id="syncNoteDone"></div>
  </div>

</div>

<script>
// ============================================================================
// State
// ============================================================================
let CONFIG = null;
let VOCAB = [];              // [{id, begriff, uebersetzung, lektion}]
let PROGRESS = {};           // { [id]: {box, lastSeen} }
let SESSION_QUEUE = [];
let SESSION_DONE = 0;
let SESSION_WRONG = {};
let currentId = null;
let mode = 'answering';
let lastCorrect = null;
let currentLerntag = 1;
let unlockedLektionen = 0;
let totalLektionen = 0;

// ============================================================================
// Utilities
// ============================================================================
function show(id) {
  ['loading', 'errorScreen', 'setup', 'quiz', 'done'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}
function fail(msg) {
  document.getElementById('errText').innerHTML = msg;
  show('errorScreen');
}
function normalize(str) {
  return str.toLowerCase()
    .replace(/\([^)]*\)/g, ' ')
    .replace(/\/[-\wäöüßā-ȳ]+/gi, ' ')
    .replace(/[āăâ]/g, 'a').replace(/[ēĕê]/g, 'e').replace(/[īĭî]/g, 'i')
    .replace(/[ōŏô]/g, 'o').replace(/[ūŭû]/g, 'u')
    .replace(/^(to|zu)\s+/, '')
    .replace(/[.,!?"']/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}
function alternatives(raw) { return raw.split(/[;,]/).map(normalize).filter(Boolean); }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function isWeekend(d) { const day = d.getDay(); return day === 0 || day === 6; }
function inVacation(d, ranges) { return ranges.some(([s,e]) => d >= parseDate(s) && d <= parseDate(e)); }
function isStudyDay(d, ranges) { return !isWeekend(d) && !inVacation(d, ranges); }
function countStudyDays(start, end, ranges) {
  let count = 0, d = new Date(start);
  while (d <= end) { if (isStudyDay(d, ranges)) count++; d.setDate(d.getDate() + 1); }
  return count;
}
function downloadFile(filename, text, mime) {
  const blob = new Blob([text], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================================
// CSV parsing (Semikolon-getrennt, Felder in "..." mit "" als escaped quote)
// ============================================================================
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ';') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && next === '\n') i++;
        row.push(field); field = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows;
}
function csvField(s) { return '"' + String(s == null ? '' : s).replace(/"/g, '""') + '"'; }
function serializeCSV(vocab) {
  const lines = ['begriff;uebersetzung;lektion'];
  vocab.forEach(w => lines.push(csvField(w.begriff) + ';' + csvField(w.uebersetzung) + ';' + w.lektion));
  return lines.join('\n');
}

// ============================================================================
// Lokaler Speicher (localStorage) - einzige automatische Speicherung
// ============================================================================
function lsGet(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } }
function lsSet(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch { return false; } }
function progressKey() { return 'vt_progress::' + (CONFIG.csvFile || 'default'); }
function overridesKey() { return 'vt_vocab_overrides::' + (CONFIG.csvFile || 'default'); }

// ============================================================================
// Init
// ============================================================================
async function init() {
  try {
    const cfgRes = await fetch('config.json');
    if (!cfgRes.ok) throw new Error('config.json konnte nicht geladen werden.');
    CONFIG = await cfgRes.json();

    const csvRes = await fetch(CONFIG.csvFile);
    if (!csvRes.ok) throw new Error(`${CONFIG.csvFile} konnte nicht geladen werden.`);
    const csvText = await csvRes.text();
    const rows = parseCSV(csvText);
    const header = rows[0].map(h => h.trim().toLowerCase());
    const iBegriff = header.indexOf('begriff');
    const iUeb = header.indexOf('uebersetzung');
    const iLekt = header.indexOf('lektion');
    if (iBegriff < 0 || iUeb < 0 || iLekt < 0) {
      throw new Error('Die CSV braucht die Spalten "begriff", "uebersetzung" und "lektion".');
    }
    VOCAB = rows.slice(1).filter(r => r[iBegriff] && r[iBegriff].trim()).map((r, idx) => ({
      id: idx,
      begriff: r[iBegriff].trim(),
      uebersetzung: r[iUeb].trim(),
      lektion: parseInt(r[iLekt], 10) || 1
    }));
    if (VOCAB.length === 0) throw new Error('Keine Vokabeln in der CSV gefunden.');

    // Lokal gespeicherte Korrekturen über die Basisdaten legen
    const overrides = lsGet(overridesKey()) || {};
    Object.keys(overrides).forEach(id => { if (VOCAB[id]) Object.assign(VOCAB[id], overrides[id]); });

    totalLektionen = Math.max(...VOCAB.map(w => w.lektion));

    // Kalender berechnen
    const today = new Date(); today.setHours(0,0,0,0);
    const start = parseDate(CONFIG.startDate);
    const end = parseDate(CONFIG.endDate);
    const ranges = CONFIG.vacationRanges || [];
    const totalLerntage = Math.max(1, countStudyDays(start, end, ranges));
    let effectiveToday = today;
    if (today < start) effectiveToday = start;
    if (today > end) effectiveToday = end;
    currentLerntag = Math.max(1, countStudyDays(start, effectiveToday, ranges));

    const lessonsPerDay = Math.ceil(totalLektionen / totalLerntage);
    unlockedLektionen = Math.min(totalLektionen, lessonsPerDay * currentLerntag);

    // Fortschritt aus dem Browser laden
    PROGRESS = lsGet(progressKey()) || {};

    renderDashboard(totalLerntage);
    show('setup');
  } catch (e) {
    fail('Der Trainer konnte nicht gestartet werden:<br><br><b>' + e.message + '</b><br><br>Prüfe, ob <code>config.json</code> und die Vokabel-CSV im selben Ordner wie diese Datei liegen und die Seite über einen Webserver (nicht als lokale Datei) aufgerufen wird.');
  }
}

function dueWordIds() {
  const intervals = CONFIG.leitnerIntervals || [1,2,4,8,16];
  return VOCAB.filter(w => w.lektion <= unlockedLektionen).filter(w => {
    const p = PROGRESS[w.id];
    if (!p) return true;
    const interval = intervals[Math.min(p.box, intervals.length) - 1] || 1;
    return (p.lastSeen + interval) <= currentLerntag;
  }).map(w => w.id);
}
function masteredCount() {
  const maxBox = (CONFIG.leitnerIntervals || [1,2,4,8,16]).length;
  return VOCAB.filter(w => w.lektion <= unlockedLektionen && PROGRESS[w.id] && PROGRESS[w.id].box >= maxBox).length;
}

function renderDashboard(totalLerntage) {
  document.getElementById('setupEyebrow').textContent = `📖 ${CONFIG.sourceLabel} → ${CONFIG.targetLabel} · Vokabeltraining`;
  document.getElementById('setupTitle').textContent = CONFIG.title || 'Vokabeltraining';
  document.getElementById('setupDesc').textContent =
    `${VOCAB.length} Wörter aus ${totalLektionen} Lektionen. Gut gekonnte Wörter kommen seltener dran, neue Lektionen werden nach und nach freigeschaltet.`;

  const due = dueWordIds().length;
  document.getElementById('statLerntag').textContent = `${currentLerntag}/${totalLerntage}`;
  document.getElementById('statDue').textContent = due;
  document.getElementById('statMastered').textContent = masteredCount();
  document.getElementById('statLektionen').textContent = `${unlockedLektionen}/${totalLektionen}`;
  document.getElementById('lektionFill').style.width = Math.round(unlockedLektionen/totalLektionen*100) + '%';
  document.getElementById('syncNote').textContent = '✓ Fortschritt wird automatisch in diesem Browser gespeichert.';

  document.getElementById('startBtn').disabled = due === 0;
  document.getElementById('startBtn').textContent = due === 0
    ? 'Heute schon alles erledigt ✓'
    : `✨ Training starten (${Math.min(due, CONFIG.sessionSize || 25)} Wörter)`;
}

// ============================================================================
// Fortschritt/Vokabeln: Export & Import
// ============================================================================
function exportProgress() {
  downloadFile('fortschritt_' + new Date().toISOString().slice(0,10) + '.json', JSON.stringify(PROGRESS, null, 2), 'application/json');
  document.getElementById('toolsNote').textContent = '✓ Fortschrittsdatei heruntergeladen.';
}
function importProgress(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      PROGRESS = imported;
      lsSet(progressKey(), PROGRESS);
      document.getElementById('toolsNote').textContent = '✓ Fortschritt geladen und gespeichert.';
      renderDashboard(Math.max(1, countStudyDays(parseDate(CONFIG.startDate), parseDate(CONFIG.endDate), CONFIG.vacationRanges || [])));
    } catch (e) {
      document.getElementById('toolsNote').textContent = '⚠️ Datei konnte nicht gelesen werden: ' + e.message;
    }
  };
  reader.readAsText(file);
  evt.target.value = '';
}
function exportVocab() {
  downloadFile(CONFIG.csvFile || 'vokabeln.csv', serializeCSV(VOCAB), 'text/csv');
  document.getElementById('toolsNote').textContent = '✓ Vokabelliste heruntergeladen – bei Bedarf im Repo ersetzen.';
}

// ============================================================================
// Session
// ============================================================================
function startSession() {
  const due = shuffle(dueWordIds());
  SESSION_QUEUE = due.slice(0, CONFIG.sessionSize || 25);
  SESSION_DONE = 0;
  SESSION_WRONG = {};
  mode = 'answering';
  show('quiz');
  renderCard();
}

function renderCard() {
  const total = SESSION_DONE + SESSION_QUEUE.length;
  document.getElementById('doneCount').textContent = `${SESSION_DONE} / ${total} in dieser Sitzung`;
  document.getElementById('remainCount').textContent = `${SESSION_QUEUE.length} verbleibend`;
  document.getElementById('progressFill').style.width = total ? Math.round(SESSION_DONE/total*100) + '%' : '0%';

  if (SESSION_QUEUE.length === 0) { finishSession(); return; }
  currentId = SESSION_QUEUE[0];
  const word = VOCAB[currentId];
  document.getElementById('qlabel').textContent = CONFIG.sourceLabel;
  document.getElementById('qmeta').textContent = `Lektion ${word.lektion}`;
  document.getElementById('questionText').textContent = word.begriff;
  document.getElementById('quizCard').className = 'quiz-card';
  document.getElementById('answeringBox').classList.remove('hidden');
  document.getElementById('feedbackBox').classList.add('hidden');
  document.getElementById('editForm').classList.add('hidden');
  document.getElementById('editLink').classList.remove('hidden');
  const input = document.getElementById('answerInput');
  input.value = '';
  mode = 'answering';
  setTimeout(() => input.focus(), 30);
}

function checkAnswer() {
  const input = document.getElementById('answerInput');
  if (input.value.trim() === '') return;
  const word = VOCAB[currentId];
  const accepted = alternatives(word.uebersetzung);
  const isCorrect = accepted.includes(normalize(input.value));
  lastCorrect = isCorrect;
  mode = 'feedback';

  const maxBox = (CONFIG.leitnerIntervals || [1,2,4,8,16]).length;
  const p = PROGRESS[word.id] || { box: 0, lastSeen: 0 };
  p.box = isCorrect ? Math.min(maxBox, p.box + 1) : 1;
  p.lastSeen = currentLerntag;
  PROGRESS[word.id] = p;
  lsSet(progressKey(), PROGRESS); // nach jeder Antwort sichern - kein Datenverlust bei Tab schließen

  if (!isCorrect) SESSION_WRONG[word.id] = (SESSION_WRONG[word.id] || 0) + 1;

  document.getElementById('quizCard').className = 'quiz-card ' + (isCorrect ? 'correct' : 'wrong');
  document.getElementById('answeringBox').classList.add('hidden');
  document.getElementById('feedbackBox').classList.remove('hidden');
  const fb = document.getElementById('feedbackMsg');
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect ? '✓ Richtig!' : '✗ Nochmal üben';
  const caBox = document.getElementById('correctAnswerBox');
  if (!isCorrect) {
    caBox.classList.remove('hidden');
    caBox.innerHTML = 'Richtige Antwort: <b>' + word.uebersetzung + '</b>';
  } else {
    caBox.classList.add('hidden');
  }
}

function nextWord() {
  SESSION_QUEUE.shift();
  SESSION_DONE++;
  if (!lastCorrect) {
    const insertAt = Math.min(SESSION_QUEUE.length, 4);
    SESSION_QUEUE.splice(insertAt, 0, currentId);
    SESSION_DONE--;
  }
  renderCard();
}

function finishSession() {
  show('done');
  document.getElementById('doneStats').textContent = `${SESSION_DONE} Wörter in dieser Sitzung geschafft.`;
  const hard = Object.entries(SESSION_WRONG)
    .map(([id, count]) => ({ word: VOCAB[Number(id)], count }))
    .sort((a,b) => b.count - a.count);
  const box = document.getElementById('hardWordsBox');
  if (hard.length > 0) {
    let html = '<div class="hardlist"><div class="hardlist-title">Diese Wörter waren am schwierigsten:</div>';
    hard.slice(0,15).forEach(h => {
      html += '<div class="hardlist-item"><span>' + h.word.begriff + ' — ' + h.word.uebersetzung.split(/[;,]/)[0] + '</span><span class="cnt">' + h.count + '× falsch</span></div>';
    });
    html += '</div>';
    box.innerHTML = html;
  } else box.innerHTML = '';
  document.getElementById('syncNoteDone').textContent = '✓ Fortschritt ist in diesem Browser gespeichert.';
}

// ============================================================================
// Vokabel-Korrektur (während des Lernens)
// ============================================================================
let editPrevAnsweringVisible = true;
function toggleEdit() {
  const form = document.getElementById('editForm');
  const isOpening = form.classList.contains('hidden');
  if (isOpening) {
    const word = VOCAB[currentId];
    document.getElementById('editBegriffLabel').textContent = `Begriff (${CONFIG.sourceLabel})`;
    document.getElementById('editUebLabel').textContent = `Übersetzung (${CONFIG.targetLabel})`;
    document.getElementById('editBegriff').value = word.begriff;
    document.getElementById('editUebersetzung').value = word.uebersetzung;
    document.getElementById('editLektion').value = word.lektion;
    document.getElementById('editSyncNote').textContent = '';
    editPrevAnsweringVisible = !document.getElementById('answeringBox').classList.contains('hidden');
    document.getElementById('answeringBox').classList.add('hidden');
    document.getElementById('feedbackBox').classList.add('hidden');
    form.classList.remove('hidden');
    document.getElementById('editLink').classList.add('hidden');
  } else {
    form.classList.add('hidden');
    document.getElementById('editLink').classList.remove('hidden');
    document.getElementById(editPrevAnsweringVisible ? 'answeringBox' : 'feedbackBox').classList.remove('hidden');
  }
}

function saveWordEdit() {
  const begriff = document.getElementById('editBegriff').value.trim();
  const uebersetzung = document.getElementById('editUebersetzung').value.trim();
  const lektion = parseInt(document.getElementById('editLektion').value, 10);
  if (!begriff || !uebersetzung || !lektion) {
    document.getElementById('editSyncNote').textContent = 'Bitte alle Felder ausfüllen.';
    return;
  }
  const word = VOCAB[currentId];
  word.begriff = begriff; word.uebersetzung = uebersetzung; word.lektion = lektion;

  document.getElementById('questionText').textContent = begriff;
  document.getElementById('qmeta').textContent = `Lektion ${lektion}`;

  const overrides = lsGet(overridesKey()) || {};
  overrides[currentId] = { begriff, uebersetzung, lektion };
  lsSet(overridesKey(), overrides);

  document.getElementById('editSyncNote').textContent = '✓ Korrektur gespeichert (in diesem Browser). Über "Vokabelliste (CSV)" im Hauptmenü kannst du sie später als Datei sichern.';
  setTimeout(toggleEdit, 1100);
}

document.getElementById('answerInput')?.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { if (mode === 'answering') checkAnswer(); else nextWord(); }
});
document.addEventListener('keydown', function(e) {
  if (e.target && e.target.id === 'answerInput') return;
  if (e.key === 'Enter' && mode === 'feedback') nextWord();
});

init();
</script>
